# Render deployment configuration for Progyan Backend
services:
  - type: web
    name: progyan-backend
    env: python
    # We use our custom build script to bypass the pydantic-core rust compilation error
    buildCommand: "./build.sh"
    # This command starts your FastAPI application
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATA_PATH
        value: ./data
      - key: PYTHON_VERSION
        value: 3.14
    healthCheckPath: /api/v1/health